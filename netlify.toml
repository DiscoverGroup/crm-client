[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Daily backup at 2:00 AM UTC — background function, runs up to 15 min, no timeout on free tier
[functions."daily-backup-background"]
  schedule = "0 2 * * *"

# Raise timeout to 26s for functions that hit MongoDB/R2
[functions."daily-backup"]
  timeout = 26

[functions."database"]
  timeout = 30

[functions."get-users"]
  timeout = 26

[functions."list-backups"]
  timeout = 26

[functions."download-backup-file"]
  timeout = 26

[functions."migrate-to-mongodb"]
  timeout = 26

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  framework = "vite"
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  # FROM_NAME ("DG-CRM") and VITE_R2_BUCKET_NAME ("crm-uploads") are not secrets —
  # they appear legitimately throughout the codebase as app name and bucket name.
  # VITE_R2_PUBLIC_URL is the public read URL for the R2 bucket, intentionally public.
  # docs/** and scripts/** contain example/setup values, not production credentials.
  SECRETS_SCAN_OMIT_KEYS = "FROM_NAME,VITE_R2_BUCKET_NAME,VITE_R2_PUBLIC_URL,VITE_R2_ACCOUNT_ID"
  SECRETS_SCAN_OMIT_PATHS = "docs/**,scripts/**"

# ── HTTP Security Headers ──────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Legacy XSS protection for older browsers
    X-XSS-Protection = "1; mode=block"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser feature access
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    # Force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Allow Auth0 popup to communicate back to opener window
    Cross-Origin-Opener-Policy = "unsafe-none"
    # Content Security Policy
    # http: in connect-src and img-src is required for local MinIO storage (LAN, HTTP only).
    # If ever deployed to HTTPS hosting, MinIO would also need HTTPS — this does not weaken
    # security for remote users since local MinIO is unreachable from the public internet.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.auth0.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self' data: https://fonts.gstatic.com; frame-src https://*.auth0.com https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
